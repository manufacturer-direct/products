*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.topbar{background:linear-gradient(135deg,#0f172a,#1e3a5f);color:#fff;padding:32px 16px 24px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.topbar h1{font-size:1.2rem;font-weight:700;letter-spacing:-.3px}
.topbar .sub{font-size:.7rem;opacity:.7;margin-top:4px}
.topbar .badge{display:inline-block;margin-top:10px;padding:4px 12px;border-radius:12px;font-size:.65rem;font-weight:600;background:rgba(255,255,255,.1);letter-spacing:.5px}

.cat-nav{display:flex;gap:6px;padding:8px 10px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:9;-webkit-overflow-scrolling:touch}
.cat-chip{flex-shrink:0;padding:7px 14px;border-radius:18px;border:1.5px solid var(--border);background:#fff;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;color:var(--text2)}
.cat-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.container{max-width:600px;margin:0 auto;padding:8px 12px 40px}

.family-card{background:var(--card);border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid var(--border);transition:all .15s}
.family-card.open{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.family-head{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:10px;user-select:none;-webkit-tap-highlight-color:transparent}
.family-head:active{background:#f8fafc}
.family-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.family-info{flex:1;min-width:0}
.family-name-row{display:flex;align-items:center;gap:6px}
.family-name{font-size:.82rem;font-weight:700}
.family-count{font-size:.65rem;color:var(--text3);background:#f1f5f9;padding:2px 8px;border-radius:8px;white-space:nowrap}
.family-range{font-size:.78rem;font-weight:700;color:var(--accent2);flex-shrink:0}
.family-arrow{font-size:.6rem;color:var(--text3);transition:transform .2s;flex-shrink:0}
.family-card.open .family-arrow{transform:rotate(180deg)}

.family-body{display:none;border-top:1px solid var(--border)}
.family-card.open .family-body{display:block}

.variant-row{display:flex;align-items:center;padding:10px 14px 10px 28px;gap:8px;border-bottom:1px solid #f1f5f9}
.variant-row:last-child{border-bottom:none}
.v-code{font-size:.72rem;font-weight:700;color:var(--text);min-width:44px}
.v-name{font-size:.74rem;color:var(--text);flex:1}
.v-spec{font-size:.68rem;color:var(--text3)}
.v-price{font-size:.78rem;font-weight:700;color:var(--accent2);white-space:nowrap}

.footer{text-align:center;padding:20px 16px;color:var(--text3);font-size:.65rem;line-height:1.8}
.footer strong{color:var(--text2)}
.search-wrap{padding:8px 10px;background:#fff;position:sticky;top:0;z-index:8;border-bottom:1px solid var(--border)}
.search-wrap input{width:100%;padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:.78rem;outline:none;background:#f8fafc}
.search-wrap input:focus{border-color:var(--accent);background:#fff}

.empty-state{text-align:center;padding:40px;color:var(--text3);font-size:.8rem}

let currentCat = 'all';
let searchTerm = '';

function setCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  document.querySelector(`.cat-chip[data-cat="${cat}"]`).classList.add('active');
  renderProducts();
}

function filterProducts() {
  searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
  renderProducts();
}

function renderProducts() {
  const container = document.getElementById('productList');
  let visible = families;
  if (currentCat !== 'all') visible = families.filter(f=>f.cat===currentCat);
  if (searchTerm) {
    visible = families.filter(f=>{
      const matchName = f.name.toLowerCase().includes(searchTerm);
      const matchCode = f.items.some(it=>it.code.toLowerCase().includes(searchTerm));
      const matchSpec = f.items.some(it=>it.spec.toLowerCase().includes(searchTerm));
      return matchName || matchCode || matchSpec;
    });
  }
  if (visible.length===0) {
    container.innerHTML = '<div class="empty-state">No products found</div>';
    return;
  }
  container.innerHTML = visible.map(f=>{
    const prices = f.items.map(i=>i.price);
    const range = prices.length>1 ? `$${Math.min(...prices)}â€“$${Math.max(...prices)}` : `$${prices[0]}`;
    return `<div class="family-card">
      <div class="family-head" onclick="this.parentElement.classList.toggle('open')">
        <div class="family-dot" style="background:${f.color}"></div>
        <div class="family-info">
          <div class="family-name-row">
            <span class="family-name">${f.name}</span>
            <span class="family-count">${f.items.length} specs</span>
          </div>
        </div>
        <span class="family-range">${range}</span>
        <span class="family-arrow">â–Ľ</span>
      </div>
      <div class="family-body">
        ${f.items.map(it=>`<div class="variant-row">
          <span class="v-code">${it.code}</span>
          <span class="v-spec">${it.spec}</span>
          <span class="v-price">$${it.price}<span style="font-weight:400;font-size:.65rem;color:var(--text3)">/box</span></span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}
