<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate of Analysis - DSIP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  .header-bar { background: #1a5276; color: #fff; padding: 20px 30px; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; align-items: center; }
  .header-bar h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
  .badge { display: inline-block; background: #27ae60; color: #fff; padding: 8px 18px; border-radius: 4px; font-size: 14px; font-weight: 600; letter-spacing: 1px; }
  .page { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 4px; }
  .page img { width: 100%; display: block; }
  .footer-bar { background: #fff; padding: 20px 30px; border-radius: 0 0 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; margin-top: 4px; }
  .download-btn { display: inline-block; padding: 12px 32px; background: #1a5276; color: #fff; text-decoration: none; border-radius: 6px; font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
  .download-btn:hover { background: #2471a3; }
  .info-row { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; font-size: 13px; color: #666; }
  .info-row span { background: #f0f2f5; padding: 4px 12px; border-radius: 3px; }
  @media (max-width: 600px) { .header-bar { flex-direction: column; gap: 10px; text-align: center; } }
</style>
</head>
<body>
<div class="container">
  <div class="header-bar">
    <h1>Certificate of Analysis &mdash; DSIP</h1>
    <div class="badge">VERIFIED</div>
  </div>
        <div class="page"><img src="page_1.png" alt="Page 1"></div>
        <div class="page"><img src="page_2.png" alt="Page 2"></div>
  <div class="footer-bar">
    <div class="info-row">
      <span>Purity: <strong>90.12%</strong></span>
      <span>Lot: <strong>2025-10-06</strong></span>
      <span>Date: <strong>2025-10-17</strong></span>
      <span>PubChem CID: <strong>68816</strong></span>
    </div>
    <a href="DSIP.pdf" class="download-btn">Download Full Certificate (PDF)</a>
  </div>
</div>
</body>
</html>
