<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate of Analysis - AOD-9604</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #e8e8e8; font-family: Arial, sans-serif; padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  .header-bar {
    background: #1a5276; color: #fff; padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center;
    border-radius: 6px 6px 0 0;
  }
  .header-bar h1 { font-size: 18px; font-weight: 600; }
  .header-bar .badge {
    background: #27ae60; color: #fff; padding: 5px 12px;
    border-radius: 3px; font-size: 11px; font-weight: 600; letter-spacing: 1px;
  }
  .page { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 12px; }
  .page img { width: 100%; display: block; }
  .page-label {
    background: #f0f0f0; padding: 6px 16px; font-size: 11px;
    color: #888; border-bottom: 1px solid #eee;
  }
  .footer-bar {
    background: #fff; padding: 20px 24px; text-align: center;
    border-radius: 0 0 6px 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    margin-top: 2px;
  }
  .download-btn {
    display: inline-block; padding: 12px 32px; background: #1a5276;
    color: #fff; text-decoration: none; border-radius: 4px;
    font-size: 14px; font-weight: 600;
  }
  .download-btn:hover { background: #2471a3; }
  .verify-text {
    margin-top: 12px; font-size: 12px; color: #888;
  }
  .verify-text span { color: #27ae60; font-weight: 600; }
</style>
</head>
<body>
<div class="container">

  <div class="header-bar">
    <h1>Certificate of Analysis &mdash; AOD-9604</h1>
    <div class="badge">VERIFIED</div>
  </div>

  <div class="page">
    <div class="page-label">Page 1 of 2</div>
    <img src="page_1.png" alt="Certificate of Analysis - Page 1">
  </div>

  <div class="page">
    <div class="page-label">Page 2 of 2</div>
    <img src="page_2.png" alt="Certificate of Analysis - Page 2">
  </div>

  <div class="footer-bar">
    <a href="AOD9604.pdf" class="download-btn">Download PDF</a>
    <div class="verify-text">
      <span>PROOF OF AUTHENTICITY</span> &mdash;
      This certificate is verified online. Scan the QR code to return to this page.
    </div>
  </div>

</div>
</body>
</html>
