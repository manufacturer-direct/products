<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;padding:0 0 40px}

.header{
  background:linear-gradient(135deg,#0f172a,#1e3a5f);
  padding:20px 16px 16px;text-align:center;
  position:sticky;top:0;z-index:10;
  border-bottom:2px solid #f59e0b;
}
.header h1{font-size:1rem;font-weight:700}
.header .sub{font-size:.65rem;color:#94a3b8;margin-top:2px}

.summary-bar{
  display:flex;gap:8px;padding:10px 12px;
  overflow-x:auto;background:#1e293b;
  font-size:.62rem;white-space:nowrap;
  position:sticky;top:0;z-index:9;
}
.summary-chip{
  flex-shrink:0;padding:4px 10px;border-radius:10px;
  background:#334155;color:#cbd5e1;
}
.summary-chip b{color:#f59e0b}

.cat-header{
  background:#1e293b;padding:10px 14px;
  font-size:.78rem;font-weight:700;color:#38bdf8;
  position:sticky;top:0;z-index:8;
  border-bottom:1px solid #334155;
  display:flex;justify-content:space-between;
  align-items:center;
}

.table-wrap{overflow-x:auto}

table{width:100%;border-collapse:collapse;font-size:.72rem}
th{text-align:left;padding:6px 8px;font-size:.6rem;color:#64748b;font-weight:600;text-transform:uppercase;background:#0f172a;position:sticky;top:0;z-index:7}
th.right{text-align:right}
td{padding:7px 8px;border-bottom:1px solid #1e293b}
td.right{text-align:right;font-weight:600}

tr:nth-child(even) td{background:rgba(255,255,255,.02)}

.code{font-size:.6rem;color:#38bdf8;font-weight:700;display:block}
.name{font-weight:600;color:#f1f5f9}
.spec{font-size:.62rem;color:#94a3b8}
.price{color:#e2e8f0}
.stock{color:#34d399;font-weight:700}
.amount{color:#fbbf24;font-weight:700}

.cat-total{
  background:#1e293b;
  padding:6px 14px;
  font-size:.65rem;color:#94a3b8;
  text-align:right;
  border-top:1px solid #334155;
}
.cat-total b{color:#f59e0b}

.footer{
  text-align:center;padding:24px 16px;
  font-size:.6rem;color:#475569;
}

@media(min-width:640px){
  body{max-width:680px;margin:0 auto}
  .header h1{font-size:1.3rem}
  table{font-size:.78rem}
  .code{font-size:.65rem}
}
</style>

// Generate random stock (seeded for consistency)
function seededRandom(seed) {
  let s = seed;
  return function() { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
}
const rand = seededRandom(42);
function randQty() { return Math.floor(rand() * 9001) + 1000; }

const catsOrder = ["GLP-1","HGH","Repair","Anti-Aging","Immune/Neuro","Other"];
const catGroups = {};
catsOrder.forEach(c => catGroups[c] = []);

let totalItems = 0, totalStock = 0, totalValue = 0;

families.forEach(f => {
  f.items.forEach(it => {
    const qty = randQty();
    const amt = it.price * qty;
    totalItems++; totalStock += qty; totalValue += amt;
    catGroups[f.cat].push({...it, name: f.name, qty, amt});
  });
});

// Summary bar
document.getElementById('summaryBar').innerHTML =
  `<span class="summary-chip">Products <b>${totalItems}</b></span>` +
  `<span class="summary-chip">Stock <b>${totalStock.toLocaleString()}</b> boxes</span>` +
  `<span class="summary-chip">Value <b>$${totalValue.toLocaleString()}</b></span>`;

// Content
let html = '';
catsOrder.forEach(cat => {
  const items = catGroups[cat];
  if (!items.length) return;
  const catStock = items.reduce((s,i) => s + i.qty, 0);
  const catValue = items.reduce((s,i) => s + i.amt, 0);

  html += `<div class="cat-header">
    <span>${cat}</span>
    <span style="font-size:.62rem;font-weight:400;color:#94a3b8">${items.length} products &middot; ${catStock.toLocaleString()} boxes &middot; $${catValue.toLocaleString()}</span>
